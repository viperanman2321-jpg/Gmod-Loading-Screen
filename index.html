<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        #slideshow {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<img id="slideshow" src="IMAGE1_HERE">

<script>
    // Put your Discord CDN links here
    const images = [
        "https://media.discordapp.net/attachments/1496675185858973769/1496675234991046779/slide2.png?ex=69eabeee&is=69e96d6e&hm=91a820acc38605c7fc19f2f1b17e43850c8af243e5618641463391f9d4f28b89&=&format=webp&quality=lossless",
        "https://media.discordapp.net/attachments/1496675185858973769/1496675236068724867/slide3.png?ex=69eabeef&is=69e96d6f&hm=7f27530aba3e68547a42ecd34334e6de91bc7e6e809062dc1bff0bcbfc6c3869&=&format=webp&quality=lossless",
        "https://media.discordapp.net/attachments/1496675185858973769/1496675236584882379/slide1.png?ex=69eabeef&is=69e96d6f&hm=dad0169c1a151d1c0eeb69214babf134221a290a5c92ea86e358463ac75cce04&=&format=webp&quality=lossless"
    ];

    let index = 0;
    const img = document.getElementById("slideshow");

    setInterval(() => {
        index = (index + 1) % images.length;
        img.src = images[index];
    }, 4000); // 4 seconds per image
</script>

</body>
</html>
